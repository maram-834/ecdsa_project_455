<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECDSA Signature Generator</title>
    <link rel="stylesheet" href="style.css">

    <!-- Elliptic library -->
    <script src="https://cdn.jsdelivr.net/npm/elliptic@6.5.4/dist/elliptic.min.js"></script>
</head>

<body>
    <div class="container">
        <h1>ECDSA Signature Generator</h1>

        <label>Message:</label>
        <textarea id="message" placeholder="Enter a message"></textarea>

        <button onclick="generateSignature()">Generate Signature</button>

        <h2>Your Keys</h2>
        <p><strong>Private Key:</strong></p>
        <textarea id="privateKey" readonly></textarea>

        <p><strong>Public Key:</strong></p>
        <textarea id="publicKey" readonly></textarea>

        <h2>Signature</h2>
        <textarea id="signature" readonly></textarea>
    </div>

    <script src="app.js"></script>
</body>
</html>
