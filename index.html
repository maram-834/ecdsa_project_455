<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECDSA Signature Demo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/elliptic@6.5.4/elliptic.min.js"></script>
</head>

<body>
    <header>
        <h1>Elliptic Curve Digital Signature Algorithm (ECDSA)</h1>
        <p>Sign a message with a private key and verify it with the public key.</p>
    </header>

    <main>
        <section>
            <h2>Step 1: Enter a Message</h2>
            <label for="message">Message:</label>
            <input type="text" id="message" placeholder="Enter a message">
            <button onclick="generateSignature()">Sign Message</button>
        </section>

        <section>
            <h2>Step 2: Signature</h2>
            <div id="signatureOutput"></div>
        </section>

        <section>
            <h2>Step 3: Verify</h2>
            <label for="verifyMessage">Message:</label>
            <input type="text" id="verifyMessage">

            <label for="verifySignature">Signature (r,s):</label>
            <input type="text" id="verifySignature" placeholder="r,s">

            <button onclick="verifySignature()">Verify</button>
            <div id="verificationResult"></div>
        </section>
    </main>

    <footer>
        <p>Educational ECDSA Demo</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
